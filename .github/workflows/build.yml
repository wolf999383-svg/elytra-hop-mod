name: Build Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew clean build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: elytrahop-mod
          path: build/libs/
